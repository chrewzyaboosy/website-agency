name: Deploy to GitHub Pages

# Publishes the site to GitHub Pages on every push to the work branch (or main).
# This gives you a live, shareable preview URL with no local setup:
#   https://chrewzyaboosy.github.io/website-agency/
# Pages headers (_headers / vercel.json) are ignored by Pages — they apply on
# Netlify/Vercel. For a preview, Pages is perfect.

on:
  push:
    branches: ["claude/happy-lamport-1zoSI", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable if possible)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
