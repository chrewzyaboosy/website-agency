<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="theme-color" content="#171311" />
  <link rel="canonical" href="https://mainstreetweb.example/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Main Street Web — Websites &amp; AI Automation for Local Business" />
  <meta property="og:description" content="Fast, modern websites + AI automation for local businesses. More calls, less busywork. Most sites launch in about a week." />
  <meta property="og:url" content="https://mainstreetweb.example/" />
  <meta property="og:image" content="og-image.svg" />
  <meta property="og:site_name" content="Main Street Web" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Main Street Web — Websites &amp; AI Automation for Local Business" />
  <meta name="twitter:description" content="Fast, modern websites + AI automation for local businesses. More calls, less busywork." />
  <meta name="twitter:image" content="og-image.svg" />

  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" />

  <!-- Tailwind (Play CDN, no build step) + brand config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#171311', inkSoft: '#2a2420',
            paper: '#f7f4ef', paper2: '#efe9e0', line: '#e2dacd',
            muted: '#6b645c', mutedDk: '#b7ad9f',
            accent: '#cc3d18', accentDeep: '#b2380f', accentBright: '#f0673c'
          },
          fontFamily: {
            sans: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
          },
          keyframes: {
            floaty: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
            floatySlow: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(8px)' } }
          },
          animation: {
            floaty: 'floaty 6s ease-in-out infinite',
            floatySlow: 'floatySlow 7s ease-in-out infinite'
          }
        }
      }
    };
  </script>

  <style>
    html { scroll-padding-top: 84px; }
    body { -webkit-font-smoothing: antialiased; }
    /* Loading hint until React mounts */
    #root:empty::after { content: "Loading…"; display: block; text-align: center; padding: 140px 20px; color: #6b645c; font-family: "Space Grotesk", system-ui, sans-serif; }
    @keyframes msw-spin { to { transform: rotate(360deg); } }
    .msw-spin { animation: msw-spin .7s linear infinite; }
    /* Respect reduced-motion everywhere */
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
    }
  </style>

  <!-- Structured data: helps Google show your business + FAQ rich results.
       Update the URL/phone/email to your real details. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "ProfessionalService",
        "@id": "https://mainstreetweb.example/#business",
        "name": "Main Street Web",
        "description": "Fast, modern websites and AI automation for local businesses in the Greater Milwaukee area.",
        "url": "https://mainstreetweb.example/",
        "image": "https://mainstreetweb.example/og-image.svg",
        "telephone": "+1-414-687-8929",
        "email": "hello@clearroutecarrier.com",
        "priceRange": "$$",
        "areaServed": "Greater Milwaukee, WI",
        "founder": { "@type": "Person", "name": "Abbas" },
        "address": { "@type": "PostalAddress", "addressLocality": "Milwaukee", "addressRegion": "WI", "addressCountry": "US" }
      },
      {
        "@type": "FAQPage",
        "mainEntity": [
          { "@type": "Question", "name": "How much does a website cost?",
            "acceptedAnswer": { "@type": "Answer", "text": "Sites start at $149 one-time plus $99/mo for the care plan, and most projects land between the Starter and Growth tiers. You'll get a clear, fixed price before any work starts." } },
          { "@type": "Question", "name": "How long until it's live?",
            "acceptedAnswer": { "@type": "Answer", "text": "Most single-page sites go live within a week, often in just a few days once we have your details. Bigger builds with automation take a little longer, and we'll give you the exact timeline up front." } },
          { "@type": "Question", "name": "Do I own my website?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes. The site is yours. Your domain stays in your name, and if you ever leave the care plan, you keep your site files." } },
          { "@type": "Question", "name": "What does ongoing support cover?",
            "acceptedAnswer": { "@type": "Answer", "text": "The monthly care plan covers hosting, security, uptime monitoring, updates, and monthly tweaks. You get one dedicated team that knows your site and replies in plain English. Cancel anytime." } },
          { "@type": "Question", "name": "Do you work with my type of business?",
            "acceptedAnswer": { "@type": "Answer", "text": "Very likely yes. We focus on local service businesses such as contractors, trades, restaurants, gyms, salons and dentists. If you serve customers in the Milwaukee area, let's talk." } }
        ]
      }
    ]
  }
  </script>

  <!-- Optional privacy-friendly analytics (Plausible — no cookies, GDPR-friendly).
       To enable: (1) sign up at https://plausible.io and add your domain,
       (2) uncomment the line below and set data-domain, (3) add
       https://plausible.io to script-src AND connect-src in the main-page CSP
       (_headers + vercel.json).
  <script defer data-domain="yourdomain.com" src="https://plausible.io/js/script.js"></script>
  -->
</head>
<body class="bg-paper text-ink font-sans">

      <p style="margin:0 0 6px"><strong>Call or text:</strong> <a href="tel:+14146878929" style="color:#b2380f">414-687-8929</a></p>
      <p style="margin:0 0 18px"><strong>Email:</strong> <a href="mailto:hello@clearroutecarrier.com" style="color:#b2380f">hello@clearroutecarrier.com</a></p>
      <p style="color:#6b645c">This site needs JavaScript for the full experience — please enable it, or just reach out using the details above.</p>
    </div>
  </noscript>

  <!-- React + htm (no build, no eval) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js" crossorigin></script>
  <script src="app.js"></script>
</body>
</html>
