  <!-- Tailwind (Play CDN, no build step) + brand config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#171311', inkSoft: '#2a2420',
            paper: '#f7f4ef', paper2: '#efe9e0', line: '#e2dacd',
            muted: '#6b645c', mutedDk: '#b7ad9f',
            accent: '#cc3d18', accentDeep: '#b2380f', accentBright: '#f0673c'
          },
          fontFamily: {
            sans: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
          },
          keyframes: {
            floaty: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
            floatySlow: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(8px)' } }
          },
          animation: {
            floaty: 'floaty 6s ease-in-out infinite',
            floatySlow: 'floatySlow 7s ease-in-out infinite'
          }
        }
      }
    };
  </script>

  <style>
    html { scroll-padding-top: 84px; }
    body { -webkit-font-smoothing: antialiased; }
    /* Loading hint until React mounts */
    #root:empty::after { content: "Loading…"; display: block; text-align: center; padding: 140px 20px; color: #6b645c; font-family: "Space Grotesk", system-ui, sans-serif; }
    @keyframes msw-spin { to { transform: rotate(360deg); } }
    .msw-spin { animation: msw-spin .7s linear infinite; }
    /* Respect reduced-motion everywhere */
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
    }
  </style>
</head>
